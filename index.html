<!doctype html>
<html lang="ko">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>N배송 세팅 가이드</title>

<style>

body{
font-family:Pretendard, sans-serif;
background:#f6f7fb;
margin:0;
padding:0;
}

.container{
max-width:760px;
margin:auto;
padding:40px 20px;
}

.logo{
width:160px;
margin-bottom:20px;
}

.card{
background:white;
border-radius:14px;
padding:32px;
box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

.title{
font-size:26px;
font-weight:700;
color:#03c75a;
margin-bottom:12px;
}

.subtitle{
color:#666;
margin-bottom:30px;
}

.section{
margin-bottom:28px;
}

.label{
font-weight:600;
margin-bottom:8px;
display:block;
}

.input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
}

.radio-group{
display:flex;
gap:16px;
margin-top:6px;
}

.desc{
font-size:13px;
color:#777;
margin-top:6px;
}

.btn{
background:#0040d1;
color:white;
padding:14px 26px;
border:none;
border-radius:10px;
font-size:15px;
font-weight:600;
cursor:pointer;
}

.center{
text-align:center;
margin-top:40px;
}

.hidden{
display:none;
}

.image-option{
display:flex;
gap:16px;
margin-top:12px;
}

.image-option img{
width:120px;
border-radius:8px;
border:1px solid #ddd;
}

.summary{
line-height:1.6;
}

</style>

</head>

<body>

<div class="container">

<img class="logo"
src="https://drive.google.com/uc?export=view&id=1tgVRxlRQ63QkShpmz1434yuWDD9MpKjw">

<div class="card">

<div class="title">
N배송 세팅 가이드
</div>

<div class="subtitle">
원활한 N배송 세팅을 위해 아래 정보를 입력해주세요.
</div>


<form id="inquiryForm">

<!-- 1 -->

<div class="section">

<label class="label">
1. 품고 나우 로그인 계정 정보
</label>

<input class="input" id="email" placeholder="이메일 주소">

<input class="input" id="manager"
placeholder="담당자명"
style="margin-top:10px">

<input class="input" id="phone"
placeholder="연락처"
style="margin-top:10px">

</div>


<!-- 2 -->

<div class="section">

<label class="label">
2. 브랜드 주소지 및 대표번호
</label>

<input class="input" id="brandAddress"
placeholder="브랜드 주소지">

<input class="input" id="brandPhone"
placeholder="대표번호"
style="margin-top:10px">

</div>


<!-- 3 -->

<div class="section">

<label class="label">
3. 반품 회수지
</label>

<div class="radio-group">

<label>
<input type="radio" name="return" value="품고"> 품고
</label>

<label>
<input type="radio" name="return" value="자사물류"> 자사 물류
</label>

</div>

</div>


<!-- 4 -->

<div class="section">

<label class="label">
4. 초도 입고 예정일
</label>

<input class="input"
type="date"
id="inboundDate">

</div>


<!-- 5 -->

<div class="section">

<label class="label">
5. 포장 방법
</label>

<select class="input" id="packing">

<option value="기본포장">
기본 포장
</option>

<option value="에어캡">
에어캡 포장
</option>

<option value="버블페이퍼">
버블페이퍼 포장
</option>

</select>

<div class="image-option">

<img src="https://i.imgur.com/Jnq6E1G.png">

<img src="https://i.imgur.com/V3yQp0P.png">

<img src="https://i.imgur.com/4k9F6fF.png">

</div>

<div class="desc">

기본 포장 : 박스 상·하단에 에어캡을 덮어 출고  
에어캡 포장 : 에어캡 완충 후 출고 (추가 비용 발생)  
버블페이퍼 포장 : 버블페이퍼 완충 후 출고 (추가 비용 발생)

</div>

</div>


<!-- 6 -->

<div class="section">

<label class="label">

6. 단수 출고 상품 여부

</label>

<div class="radio-group">

<label>

<input type="radio" name="single"
value="Y"> Y

</label>

<label>

<input type="radio" name="single"
value="N"> N

</label>

</div>

<div class="desc">

합포 없이 상품(SKU) 자체에 송장을 부착하는 상품이 있는 경우 체크해주세요

</div>

</div>


<!-- 7 -->

<div class="section">

<label class="label">

7. 초도 입고 예정 월에 행사 예정이 있나요?

</label>

<div class="radio-group">

<label>

<input type="radio"
name="event"
value="Y"
onclick="toggleEvent(true)"> Y

</label>

<label>

<input type="radio"
name="event"
value="N"
onclick="toggleEvent(false)"> N

</label>

</div>

<div id="eventArea" class="hidden">

<input class="input"
id="eventName"
placeholder="행사명"
style="margin-top:10px">

<input class="input"
type="date"
id="eventDate"
style="margin-top:10px">

<input class="input"
id="eventQty"
placeholder="예상 출고 송장 건수"
style="margin-top:10px">

</div>

</div>


<!-- 8 -->

<div class="section">

<label class="label">

8. 품고에 궁금한 사항

</label>

<textarea
class="input"
id="question"
rows="4"
placeholder="자유롭게 작성해주세요"></textarea>

</div>


<div class="center">

<button type="button"
class="btn"
onclick="submitForm()">

제출하기

</button>

</div>


</form>

</div>

</div>



<script>

const WEBAPP =
"https://script.google.com/macros/s/AKfycbwwxe5ZigCmq-tjXyGZJUK1Nomije28Fu6Ueb-pw_d2KUsTsGHE5lcEeG505gfcVV-M/exec";


function toggleEvent(show){

const el=document.getElementById("eventArea");

if(show){

el.classList.remove("hidden");

}else{

el.classList.add("hidden");

}

}



function submitForm(){

const data={

email:email.value,

manager:manager.value,

phone:phone.value,

brandAddress:brandAddress.value,

brandPhone:brandPhone.value,

returnType:document.querySelector('input[name="return"]:checked')?.value,

inboundDate:inboundDate.value,

packing:packing.value,

singleShip:document.querySelector('input[name="single"]:checked')?.value,

event:document.querySelector('input[name="event"]:checked')?.value,

eventName:eventName.value,

eventDate:eventDate.value,

eventQty:eventQty.value,

question:question.value

};



fetch(WEBAPP,{

method:"POST",

body:JSON.stringify(data)

})

.then(r=>r.text())

.then(()=>{

alert("제출이 완료되었습니다.\n\n제출 내용을 확인 후 N배송 세팅 가이드를 오픈해드립니다.");

});

}

</script>


</body>
</html>
