<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>품고 셀프 온보딩 가이드</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />

  <style>
    :root{
      --bg:#f6f8fc;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --primary:#03C75A;
      --primary-soft:#ECFDF3;
      --primary-deep:#02b350;
      --warn-bg:#fff7ed;
      --warn-line:#fed7aa;
      --warn-text:#9a3412;
      --danger-bg:#fff1f2;
      --danger-line:#fecdd3;
      --danger-text:#be123c;
      --info-bg:#eff6ff;
      --info-line:#bfdbfe;
      --info-text:#1d4ed8;
      --shadow:0 10px 30px rgba(17,24,39,.08);
      --radius-xl:24px;
      --radius-lg:18px;
      --radius-md:14px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:"Pretendard Variable","Pretendard",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:linear-gradient(180deg,#f8fafc 0%, #f6f8fc 100%);
      color:var(--text);
      line-height:1.55;
    }

    .wrap{
      max-width:1440px;
      margin:0 auto;
      padding:24px;
    }

    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:20px;
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      font-weight:700;
      color:var(--primary-deep);
      background:var(--primary-soft);
      padding:8px 12px;
      border-radius:999px;
      width:max-content;
    }

    h1{
      margin:0;
      font-size:32px;
      line-height:1.2;
      letter-spacing:-.03em;
    }

    .subtitle{
      margin:0;
      color:var(--muted);
      font-size:15px;
    }

    .layout{
      display:grid;
      grid-template-columns:320px minmax(0,1fr);
      gap:24px;
      align-items:start;
    }

    .sidebar{
      position:sticky;
      top:20px;
    }

    .panel{
      background:var(--card);
      border:1px solid rgba(229,231,235,.9);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
    }

    .side-card{
      padding:18px;
    }

    .side-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:14px;
    }

    .side-title{
      font-size:18px;
      font-weight:800;
      letter-spacing:-.02em;
    }

    .progress-badge{
      font-size:12px;
      font-weight:700;
      color:var(--primary-deep);
      background:var(--primary-soft);
      border-radius:999px;
      padding:7px 10px;
    }

    .step-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .step-btn{
      width:100%;
      text-align:left;
      border:1px solid var(--line);
      background:#fff;
      border-radius:18px;
      padding:14px;
      cursor:pointer;
      transition:.18s ease;
      display:flex;
      gap:12px;
      align-items:flex-start;
    }

    .step-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 20px rgba(17,24,39,.05);
    }

    .step-btn.active{
      border-color:rgba(3,199,90,.28);
      background:linear-gradient(180deg,#fafffc 0%, #f3fff8 100%);
      box-shadow:0 10px 24px rgba(3,199,90,.10);
    }

    .step-num{
      width:34px;
      height:34px;
      border-radius:12px;
      flex:0 0 34px;
      display:grid;
      place-items:center;
      font-weight:800;
      font-size:14px;
      background:#f3f4f6;
      color:#111827;
    }

    .step-btn.active .step-num{
      background:var(--primary);
      color:#fff;
    }

    .step-meta{
      min-width:0;
      flex:1;
    }

    .step-name{
      font-size:15px;
      font-weight:800;
      margin:0 0 4px;
      letter-spacing:-.02em;
    }

    .step-status{
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--muted);
      font-size:13px;
      font-weight:600;
    }

    .status-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#d1d5db;
    }
    .status-dot.done{background:var(--primary)}
    .status-dot.current{background:#2563eb}

    .side-note{
      margin-top:14px;
      padding:12px 14px;
      border-radius:16px;
      background:#f9fafb;
      border:1px solid var(--line);
      color:var(--muted);
      font-size:13px;
    }

    .content{
      padding:24px;
    }

    .hero{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .hero-left{
      min-width:0;
    }

    .step-chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:#f3f4f6;
      color:#374151;
      font-size:13px;
      font-weight:800;
      margin-bottom:10px;
    }

    .hero h2{
      margin:0 0 8px;
      font-size:30px;
      line-height:1.2;
      letter-spacing:-.03em;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      font-size:15px;
    }

    .hero-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      background:#111827;
      color:#fff;
      padding:12px 16px;
      border-radius:14px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      transition:.18s ease;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn.secondary{
      background:#fff;
      color:#111827;
      border:1px solid var(--line);
    }
    .btn.primary{
      background:var(--primary);
    }
    .btn.primary:hover{
      background:var(--primary-deep);
    }
    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
      transform:none;
    }

    .grid{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:18px;
      margin-top:8px;
    }

    .section{
      border:1px solid var(--line);
      border-radius:20px;
      padding:20px;
      background:#fff;
    }

    .section h3{
      margin:0 0 12px;
      font-size:18px;
      letter-spacing:-.02em;
    }

    .lead-box{
      background:linear-gradient(180deg,#fbfffd 0%, #f3fff8 100%);
      border:1px solid rgba(3,199,90,.20);
      border-radius:20px;
      padding:18px;
      margin-bottom:18px;
    }

    .lead-title{
      font-size:13px;
      font-weight:800;
      color:var(--primary-deep);
      margin-bottom:8px;
    }

    .lead-text{
      margin:0;
      font-size:18px;
      font-weight:800;
      line-height:1.45;
      letter-spacing:-.02em;
    }

    .check-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin:0;
      padding:0;
      list-style:none;
    }

    .check-list li{
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:12px 14px;
      background:#f9fafb;
      border:1px solid #eef2f7;
      border-radius:16px;
      font-size:14px;
    }

    .check-icon{
      width:22px;
      height:22px;
      flex:0 0 22px;
      border-radius:999px;
      display:grid;
      place-items:center;
      background:#e5e7eb;
      color:#111827;
      font-size:12px;
      font-weight:900;
      margin-top:1px;
    }

    .info-box,.warn-box,.danger-box{
      border-radius:18px;
      padding:16px;
      margin-top:14px;
      border:1px solid;
    }

    .info-box{
      background:var(--info-bg);
      border-color:var(--info-line);
      color:var(--info-text);
    }

    .warn-box{
      background:var(--warn-bg);
      border-color:var(--warn-line);
      color:var(--warn-text);
    }

    .danger-box{
      background:var(--danger-bg);
      border-color:var(--danger-line);
      color:var(--danger-text);
    }

    .box-title{
      font-size:13px;
      font-weight:900;
      margin-bottom:8px;
    }

    .mini-list{
      margin:0;
      padding-left:18px;
    }

    .mini-list li + li{margin-top:6px}

    .path{
      background:#0f172a;
      color:#f8fafc;
      border-radius:18px;
      padding:16px;
      font-size:14px;
      line-height:1.8;
      white-space:pre-line;
      margin-top:12px;
      font-weight:700;
    }

    .subsections{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .sub-card{
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      background:#fff;
    }

    .sub-title{
      margin:0 0 8px;
      font-size:16px;
      font-weight:800;
      letter-spacing:-.02em;
    }

    .sub-text{
      margin:0;
      color:#374151;
      font-size:14px;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      margin-top:10px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:#fff;
      min-width:520px;
    }

    th,td{
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:top;
      font-size:14px;
    }

    th{
      background:#f9fafb;
      font-size:13px;
      color:#374151;
      font-weight:800;
    }

    .complete-card{
      margin-top:18px;
      border:1px solid var(--line);
      border-radius:20px;
      padding:18px;
      background:#fff;
    }

    .complete-card h3{
      margin:0 0 10px;
      font-size:18px;
    }

    .task-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:12px;
    }

    .task-item{
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fafafa;
    }

    .task-item input{
      width:18px;
      height:18px;
      margin-top:2px;
      accent-color:var(--primary);
      cursor:pointer;
    }

    .task-label{
      font-size:14px;
      font-weight:700;
      color:#111827;
    }

    .footer-nav{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-top:18px;
      flex-wrap:wrap;
    }

    .muted{
      color:var(--muted);
      font-size:13px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:7px 10px;
      border-radius:999px;
      background:#f3f4f6;
      font-size:12px;
      font-weight:800;
      color:#374151;
    }

    .empty-image{
      width:100%;
      border:1px dashed #cbd5e1;
      background:linear-gradient(180deg,#fcfcfd 0%, #f8fafc 100%);
      border-radius:18px;
      min-height:240px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#64748b;
      padding:20px;
      font-size:14px;
      font-weight:700;
    }

    @media (max-width: 1100px){
      .layout{
        grid-template-columns:1fr;
      }
      .sidebar{
        position:relative;
        top:auto;
      }
      .grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 640px){
      .wrap{padding:14px}
      h1{font-size:26px}
      .hero h2{font-size:24px}
      .content{padding:18px}
      .step-btn{padding:12px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="eyebrow">셀프 세팅 가이드</div>
        <h1>품고 셀프 온보딩</h1>
        <p class="subtitle">문의 없이 순서대로 따라가면 세팅이 완료되도록 설계된 가이드입니다.</p>
      </div>
    </div>

    <div class="layout">
      <aside class="sidebar">
        <div class="panel side-card">
          <div class="side-head">
            <div class="side-title">진행 단계</div>
            <div class="progress-badge" id="progressText">0 / 5 완료</div>
          </div>

          <div class="step-list" id="stepList"></div>

          <div class="side-note">
            현재 단계의 <strong>완료 기준</strong>을 체크하면 다음 단계로 넘어갈 수 있습니다.
          </div>
        </div>
      </aside>

      <main class="panel content">
        <div class="hero">
          <div class="hero-left">
            <div class="step-chip" id="heroChip">STEP 1</div>
            <h2 id="heroTitle">고객사 등록</h2>
            <p id="heroDesc">현재 단계의 핵심 안내가 여기에 표시됩니다.</p>
          </div>

          <div class="hero-actions">
            <button class="btn secondary" id="resetBtn" type="button">체크 초기화</button>
          </div>
        </div>

        <div class="lead-box">
          <div class="lead-title">지금 해야 할 일</div>
          <p class="lead-text" id="leadText"></p>
        </div>

        <div class="grid">
          <section class="section">
            <h3>진행 순서</h3>
            <ul class="check-list" id="flowList"></ul>

            <div class="subsections" id="detailSections" style="margin-top:18px;"></div>
          </section>

          <section class="section">
            <h3>입력 기준 / 주의사항</h3>
            <div id="rightInfo"></div>

            <div class="complete-card">
              <h3>다음 단계로 넘어가기 전 확인</h3>
              <p class="muted">아래 항목을 모두 체크하면 이 단계가 완료로 표시됩니다.</p>
              <div class="task-list" id="taskList"></div>
            </div>
          </section>
        </div>

        <div class="footer-nav">
          <button class="btn secondary" id="prevBtn" type="button">이전 단계</button>
          <button class="btn primary" id="nextBtn" type="button">다음 단계</button>
        </div>
      </main>
    </div>
  </div>

  <script>
    const STEPS = [
      {
        id: "client_register",
        title: "고객사 등록",
        shortDesc: "고객사 등록 메일 확인 후 정보 입력, 로그인, 구성원 추가까지 완료해주세요.",
        lead: "고객사 등록 메일을 확인하고 고객사 정보 입력 → 품고 나우 로그인 → 구성원 추가까지 완료해주세요.",
        flow: [
          "고객사 등록 메일 수신",
          "고객사 정보 입력",
          "품고 나우 로그인",
          "구성원 추가"
        ],
        details: [
          {
            title: "고객사 등록 메일 수신",
            html: `
              <p class="sub-text">품고에서 발송된 <strong>고객사 등록 메일</strong>을 확인한 후, 메일 내 <strong>[고객사 등록하기]</strong> 버튼을 클릭하여 등록을 진행해주세요.</p>
              <div class="warn-box">
                <div class="box-title">주의</div>
                <ul class="mini-list">
                  <li>메일 수신 후 <strong>24시간 이내 등록</strong>이 필요합니다.</li>
                </ul>
              </div>
            `
          },
          {
            title: "고객사 정보 입력",
            html: `
              <p class="sub-text">브랜드 및 사업자 정보를 입력해주세요.</p>
              <div class="info-box">
                <div class="box-title">입력 기준</div>
                <ul class="mini-list">
                  <li>고객사명 : <strong>브랜드명과 동일하게 입력</strong></li>
                  <li>사업자 정보 : <strong>네이버 기준 사업자 정보 입력</strong></li>
                </ul>
              </div>
            `
          },
          {
            title: "품고 나우 로그인",
            html: `
              <p class="sub-text">고객사 등록이 완료되면 <strong>품고 나우 로그인</strong>을 진행해주세요.</p>
            `
          },
          {
            title: "구성원 추가",
            html: `
              <p class="sub-text">시스템을 사용할 내부 구성원을 추가해주세요.</p>
              <div class="path">품고 나우
→ 등록
→ + 구성원 추가
→ 이름 / 이메일 / 전화번호 입력
→ 구성원 추가</div>
            `
          }
        ],
        rightInfo: `
          <div class="info-box">
            <div class="box-title">완료 기준</div>
            <ul class="mini-list">
              <li>품고 나우 로그인 가능</li>
              <li>필요한 구성원 계정 추가 완료</li>
            </ul>
          </div>

          <div class="danger-box">
            <div class="box-title">문제가 발생한 경우</div>
            <p style="margin:0 0 8px;">다음 상황에 해당하는 경우 아래 정보를 전달해주세요.</p>
            <ul class="mini-list">
              <li>고객사 등록 버튼이 보이지 않는 경우</li>
              <li>메일 수신 후 24시간이 초과된 경우</li>
            </ul>
            <div class="table-wrap" style="margin-top:10px;">
              <table>
                <thead>
                  <tr><th>전달 필요 정보</th></tr>
                </thead>
                <tbody>
                  <tr><td>사업자 주소</td></tr>
                  <tr><td>브랜드 고객센터 대표번호</td></tr>
                  <tr><td>반품지 주소</td></tr>
                  <tr><td>담당자명 / 연락처 / 이메일</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        `,
        tasks: [
          "고객사 등록 메일 확인 완료",
          "고객사 정보 입력 완료",
          "품고 나우 로그인 완료",
          "필요한 구성원 추가 완료"
        ]
      },
      {
        id: "fulfillment_connect",
        title: "풀필먼트 연동",
        shortDesc: "판매처 등록 후 풀필먼트 신청, 연동 상태 확인, N배송 동의까지 진행해주세요.",
        lead: "판매처 등록 후 풀필먼트 신청 → 연동 상태 확인 → N배송 동의까지 진행해주세요.",
        flow: [
          "판매처 등록",
          "풀필먼트 신청",
          "연동 확인",
          "N배송 동의"
        ],
        details: [
          {
            title: "판매처 등록",
            html: `
              <p class="sub-text">스마트스토어 등 <strong>판매처 계정</strong>을 등록해주세요.</p>
            `
          },
          {
            title: "풀필먼트 신청",
            html: `
              <p class="sub-text">네이버 풀필먼트 이용을 위해 <strong>풀필먼트 신청</strong>을 진행해주세요.</p>
            `
          },
          {
            title: "연동 확인 & N배송 동의",
            html: `

        tasks: [
          "연결 상품 점검 완료",
          "재고 점검 완료",
          "N배송 설정 완료"

    const STORAGE_KEY = "poomgo_onboarding_state_v1";

    const state = loadState();

    let currentStepIndex = state.currentStepIndex ?? 0;

    const stepListEl = document.getElementById("stepList");
    const progressTextEl = document.getElementById("progressText");
    const heroChipEl = document.getElementById("heroChip");
    const heroTitleEl = document.getElementById("heroTitle");
    const heroDescEl = document.getElementById("heroDesc");
    const leadTextEl = document.getElementById("leadText");
    const flowListEl = document.getElementById("flowList");
    const detailSectionsEl = document.getElementById("detailSections");
    const rightInfoEl = document.getElementById("rightInfo");
    const taskListEl = document.getElementById("taskList");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");

    function loadState(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return { tasks:{}, currentStepIndex:0 };
        return JSON.parse(raw);
      }catch(e){
        return { tasks:{}, currentStepIndex:0 };
      }
    }

    function saveState(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        tasks: state.tasks || {},
        currentStepIndex
      }));
    }

    function getStepTaskState(stepId){
      if(!state.tasks) state.tasks = {};
      if(!state.tasks[stepId]) state.tasks[stepId] = [];
      return state.tasks[stepId];
    }

    function isStepDone(step){
      const tasks = getStepTaskState(step.id);
      return step.tasks.length > 0 && step.tasks.every((_, idx) => !!tasks[idx]);
    }

    function isAnyTaskChecked(step){
      const tasks = getStepTaskState(step.id);
      return tasks.some(Boolean);
    }

    function renderSidebar(){
      stepListEl.innerHTML = "";
      const completedCount = STEPS.filter(isStepDone).length;
      progressTextEl.textContent = `${completedCount} / ${STEPS.length} 완료`;

      STEPS.forEach((step, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "step-btn" + (index === currentStepIndex ? " active" : "");
        btn.addEventListener("click", () => {
          currentStepIndex = index;
          saveState();
          render();
        });

        const done = isStepDone(step);
        const started = isAnyTaskChecked(step);

        let statusText = "대기";
        let dotClass = "";
        if(index === currentStepIndex){
          statusText = done ? "완료" : "진행중";
          dotClass = done ? "done" : "current";
        }else if(done){
          statusText = "완료";
          dotClass = "done";
        }else if(started){
          statusText = "진행중";
          dotClass = "current";
        }

        btn.innerHTML = `
          <div class="step-num">${index + 1}</div>
          <div class="step-meta">
            <div class="step-name">${step.title}</div>
            <div class="step-status">
              <span class="status-dot ${dotClass}"></span>
              <span>${statusText}</span>
            </div>
          </div>
        `;
        stepListEl.appendChild(btn);
      });
    }

    function renderMain(){
      const step = STEPS[currentStepIndex];
      heroChipEl.textContent = `STEP ${currentStepIndex + 1}`;
      heroTitleEl.textContent = step.title;
      heroDescEl.textContent = step.shortDesc;
      leadTextEl.textContent = step.lead;

      flowListEl.innerHTML = "";
      step.flow.forEach((item) => {
        const li = document.createElement("li");
        li.innerHTML = `<span class="check-icon">✓</span><div>${item}</div>`;
        flowListEl.appendChild(li);
      });

      detailSectionsEl.innerHTML = "";
      step.details.forEach((item) => {
        const card = document.createElement("div");
        card.className = "sub-card";
        card.innerHTML = `
          <h4 class="sub-title">${item.title}</h4>
          ${item.html}
        `;
        detailSectionsEl.appendChild(card);
      });

      rightInfoEl.innerHTML = step.rightInfo;

      taskListEl.innerHTML = "";
      const taskState = getStepTaskState(step.id);

      step.tasks.forEach((task, idx) => {
        const row = document.createElement("label");
        row.className = "task-item";
        row.innerHTML = `
          <input type="checkbox" ${taskState[idx] ? "checked" : ""} />
          <span class="task-label">${task}</span>
        `;

        const checkbox = row.querySelector("input");
        checkbox.addEventListener("change", (e) => {
          taskState[idx] = e.target.checked;
          saveState();
          renderSidebar();
          updateNavButtons();
        });

        taskListEl.appendChild(row);
      });

      updateNavButtons();
    }

    function updateNavButtons(){
      prevBtn.disabled = currentStepIndex === 0;
      nextBtn.disabled = currentStepIndex === STEPS.length - 1;

      const step = STEPS[currentStepIndex];
      if(currentStepIndex < STEPS.length - 1){
        nextBtn.textContent = isStepDone(step) ? "다음 단계" : "다음 단계";
      }else{
        nextBtn.textContent = "마지막 단계";
      }
    }

    function render(){
      renderSidebar();
      renderMain();
    }

    prevBtn.addEventListener("click", () => {
      if(currentStepIndex > 0){
        currentStepIndex -= 1;
        saveState();
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    });

    nextBtn.addEventListener("click", () => {
      if(currentStepIndex < STEPS.length - 1){
        currentStepIndex += 1;
        saveState();
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    });

    resetBtn.addEventListener("click", () => {
      if(!confirm("체크한 완료 항목을 모두 초기화할까요?")) return;
      localStorage.removeItem(STORAGE_KEY);
      state.tasks = {};
      currentStepIndex = 0;
      saveState();
      render();
    });

    render();
  </script>
