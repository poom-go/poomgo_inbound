<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>품고 셀프 온보딩</title>

  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />
  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --primary:#03C75A;
      --primary-soft:#ecfdf3;
      --primary-deep:#02b350;
      --soft:#f8fafc;
      --warn-bg:#fff7ed;
      --warn-line:#fed7aa;
      --warn-text:#9a3412;
      --danger-bg:#fff1f2;
      --danger-line:#fecdd3;
      --danger-text:#be123c;
      --shadow:0 10px 30px rgba(15,23,42,.06);
      --radius-xl:22px;
      --radius-lg:16px;
      --radius-md:12px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%}
    body{
      font-family:"Pretendard Variable","Pretendard",system-ui,sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.6;
    }

    button,input{font:inherit}
    img{max-width:100%;display:block}
    a{text-decoration:none}

    .app{
      width:100%;
      min-height:100vh;
      padding:16px;
    }

    .topbar{
      margin-bottom:16px;
      padding:0 4px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:var(--primary-soft);
      color:var(--primary-deep);
      font-size:13px;
      font-weight:800;
      margin-bottom:10px;
    }

    h1{
      margin:0 0 6px;
      font-size:30px;
      line-height:1.2;
      letter-spacing:-.03em;
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:14px;
    }

    .layout{
      display:grid;
      grid-template-columns:300px minmax(0,1fr);
      gap:16px;
      min-height:calc(100vh - 110px);
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
    }

    .sidebar{
      display:flex;
      flex-direction:column;
      height:calc(100vh - 32px);
      position:sticky;
      top:16px;
      padding:16px;
    }

    .sidebar-header{
      flex:0 0 auto;
    }

    .sidebar-steps{
      flex:1;
      overflow-y:auto;
      margin-top:10px;
      margin-bottom:10px;
      padding-right:4px;
      scroll-behavior:smooth;
    }

    .sidebar-footer{
      flex:0 0 auto;
      margin-top:auto;
    }

    .sidebar-steps::-webkit-scrollbar{
      width:6px;
    }

    .sidebar-steps::-webkit-scrollbar-thumb{
      background:#e5e7eb;
      border-radius:6px;
    }

    .sidebar-steps::-webkit-scrollbar-track{
      background:transparent;
    }

    .side-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      margin-bottom:0;
    }

    .side-title{
      font-size:17px;
      font-weight:800;
    }

    .progress{
      padding:6px 10px;
      border-radius:999px;
      background:var(--primary-soft);
      color:var(--primary-deep);
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .accordion{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .step-item{
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      background:#fff;
    }

    .step-header{
      width:100%;
      border:none;
      background:#fff;
      padding:14px;
      display:flex;
      align-items:center;
      gap:12px;
      text-align:left;
      cursor:pointer;
    }

    .step-item.active .step-header{
      background:linear-gradient(180deg,#fbfffd 0%, #f3fff8 100%);
    }

    .step-num{
      width:34px;
      height:34px;
      border-radius:11px;
      display:grid;
      place-items:center;
      font-size:14px;
      font-weight:800;
      background:#f3f4f6;
      flex:0 0 34px;
    }

    .step-item.active .step-num{
      background:var(--primary);
      color:#fff;
    }

    .step-main{
      min-width:0;
      flex:1;
    }

    .step-title{
      margin:0 0 4px;
      font-size:14px;
      font-weight:800;
      letter-spacing:-.02em;
    }

    .step-state{
      display:flex;
      align-items:center;
      gap:7px;
      color:var(--muted);
      font-size:12px;
      font-weight:700;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#d1d5db;
    }

    .dot.done{background:var(--primary)}
    .dot.current{background:#2563eb}

    .chev{
      color:#6b7280;
      transition:transform .2s ease;
      font-size:18px;
    }

    .step-item.active .chev{transform:rotate(180deg)}

    .step-body{
      display:none;
      padding:10px 14px 14px;
      border-top:1px solid var(--line);
      background:#fcfcfd;
    }

    .step-item.active .step-body{display:block}

    .step-sublist{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .step-subitem{
      display:flex;
      gap:8px;
      font-size:13px;
      color:#374151;
      word-break:break-word;
    }

    .side-note{
      padding:12px 13px;
      border-radius:14px;
      background:#f9fafb;
      border:1px solid var(--line);
      color:var(--muted);
      font-size:12px;
    }

    .main{
      padding:24px 28px;
      min-width:0;
    }

    .hero{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .step-chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:#f3f4f6;
      color:#374151;
      font-size:13px;
      font-weight:800;
      margin-bottom:10px;
    }

    .hero h2{
      margin:0 0 8px;
      font-size:28px;
      line-height:1.2;
      letter-spacing:-.03em;
      word-break:keep-all;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      font-size:15px;
      word-break:keep-all;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      padding:12px 15px;
      border-radius:12px;
      font-weight:800;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn.secondary{
      background:#fff;
      border:1px solid var(--line);
      color:#111827;
    }

    .btn.primary{
      background:var(--primary);
      color:#fff;
    }

    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .guide{
      border:1px solid var(--line);
      border-radius:20px;
      overflow:hidden;
      background:#fff;
    }

    .guide-section{
      padding:24px;
    }

    .guide-section + .guide-section{
      border-top:1px solid var(--line);
    }

    .section-label{
      margin:0 0 12px;
      font-size:13px;
      font-weight:900;
      color:#6b7280;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .lead-box{
      background:linear-gradient(180deg,#fbfffd 0%, #f3fff8 100%);
    }

    .lead-text{
      margin:0;
      font-size:20px;
      line-height:1.5;
      font-weight:800;
      letter-spacing:-.02em;
      word-break:keep-all;
    }

    .flow-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin:0;
      padding:0;
      list-style:none;
    }

    .flow-list li{
      display:flex;
      gap:12px;
      align-items:flex-start;
      padding:14px 0;
      border-bottom:1px solid #eef2f7;
      min-width:0;
    }

    .flow-list li:last-child{
      border-bottom:none;
      padding-bottom:0;
    }

    .flow-num{
      width:28px;
      height:28px;
      border-radius:999px;
      display:grid;
      place-items:center;
      background:#111827;
      color:#fff;
      font-size:12px;
      font-weight:800;
      flex:0 0 28px;
      margin-top:1px;
    }

    .flow-text{
      font-size:15px;
      font-weight:700;
      word-break:break-word;
    }

    .detail-list{
      display:flex;
      flex-direction:column;
      gap:0;
    }

    .detail-item{
      padding:18px 0;
      border-bottom:1px solid #eef2f7;
    }

    .detail-item:last-child{
      border-bottom:none;
      padding-bottom:0;
    }

    .detail-title{
      margin:0 0 8px;
      font-size:17px;
      font-weight:800;
      letter-spacing:-.02em;
      word-break:keep-all;
    }

    .detail-body{
      margin:0;
      font-size:15px;
      color:#374151;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .detail-body p{margin:0 0 10px}
    .detail-body p:last-child{margin-bottom:0}
    .detail-body table{width:100%; min-width:560px; border-collapse:collapse; background:#fff}
    .detail-body th,.detail-body td{
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:top;
      font-size:14px;
      word-break:break-word;
    }
    .detail-body th{
      background:#f9fafb;
      font-size:13px;
      font-weight:800;
      color:#374151;
    }
    .detail-body .table-wrap{
      width:100%;
      overflow-x:auto;
      margin-top:12px;
      border:1px solid var(--line);
      border-radius:14px;
    }

    .subnote{
      margin-top:10px;
      padding:14px;
      border-radius:14px;
      background:var(--soft);
      border:1px solid var(--line);
      font-size:14px;
      color:#374151;
      white-space:pre-line;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .warn{
      margin-top:10px;
      padding:14px;
      border-radius:14px;
      background:var(--warn-bg);
      border:1px solid var(--warn-line);
      color:var(--warn-text);
      font-size:14px;
    }

    .warn strong{
      display:block;
      margin-bottom:6px;
      font-size:13px;
    }

    .render-image{
      margin-top:12px;
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      background:#fff;
    }

    .render-image img{
      width:100%;
      height:auto;
      object-fit:contain;
      background:#fff;
    }

    .render-caption{
      padding:12px 14px;
      border-top:1px solid var(--line);
      font-size:13px;
      color:var(--muted);
    }

    .check-area{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }

    .check-row{
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding:14px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fafafa;
      min-width:0;
    }

    .check-row input{
      width:18px;
      height:18px;
      margin-top:2px;
      accent-color:var(--primary);
      flex:0 0 auto;
    }

    .check-row span{
      font-size:14px;
      font-weight:700;
      word-break:break-word;
    }

    .footer-nav{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-top:16px;
      flex-wrap:wrap;
    }

    .loading{
      padding:40px 20px;
      color:var(--muted);
      font-size:14px;
    }

    .error{
      margin-top:12px;
      padding:16px;
      border-radius:14px;
      background:var(--danger-bg);
      border:1px solid var(--danger-line);
      color:var(--danger-text);
      font-size:14px;
      white-space:pre-line;
    }

    .empty{
      color:var(--muted);
      font-size:14px;
    }

    .modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:1000;
    }

    .modal.open{
      display:flex;
    }

    .modal-backdrop{
      position:absolute;
      inset:0;
      background:rgba(15,23,42,.48);
    }

    .modal-panel{
      position:relative;
      width:min(760px, 100%);
      max-height:85vh;
      overflow:auto;
      background:#fff;
      border-radius:24px;
      border:1px solid var(--line);
      box-shadow:0 24px 60px rgba(15,23,42,.24);
      padding:24px;
    }

    .modal-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:18px;
    }

    .modal-title{
      margin:0;
      font-size:24px;
      line-height:1.2;
      letter-spacing:-.03em;
    }

    .modal-sub{
      margin:8px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .icon-btn{
      border:none;
      background:#f3f4f6;
      width:40px;
      height:40px;
      border-radius:12px;
      cursor:pointer;
      font-size:20px;
      line-height:1;
    }

    .faq-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .faq-item{
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      background:#fff;
    }

    .faq-q{
      width:100%;
      border:none;
      background:#fff;
      padding:16px;
      text-align:left;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      cursor:pointer;
      font-weight:800;
      font-size:15px;
    }

    .faq-q:hover{
      background:#fafafa;
    }

    .faq-a{
      display:none;
      padding:0 16px 16px;
      color:#374151;
      font-size:14px;
      white-space:pre-line;
      word-break:break-word;
    }

    .faq-item.open .faq-a{
      display:block;
    }

    .faq-item.open .faq-arrow{
      transform:rotate(180deg);
    }

    .faq-arrow{
      transition:transform .2s ease;
      color:#6b7280;
      flex:0 0 auto;
    }

    @media (max-width:1024px){
      .layout{
        grid-template-columns:1fr;
      }
      .sidebar{
        position:static;
        height:auto;
      }
      .sidebar-steps{
        overflow:visible;
        max-height:none;
      }
      .check-area{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:640px){
      .app{padding:10px}
      .main{padding:18px}
      h1{font-size:24px}
      .hero h2{font-size:23px}
      .guide-section{padding:18px}
      .modal-panel{padding:18px}
      .modal-title{font-size:20px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="badge">셀프 세팅 가이드</div>
      <h1 id="pageTitle">품고 셀프 온보딩</h1>
      <p class="sub" id="appSub">시트에 입력한 내용이 자동 반영됩니다.</p>
    </div>

    <div class="layout">
      <aside class="card sidebar">
        <div class="sidebar-header">
          <div class="side-head">
            <div class="side-title">진행 단계</div>
            <div class="progress" id="progressText">0 / 0 완료</div>
          </div>
        </div>

        <div class="sidebar-steps">
          <div class="accordion" id="stepAccordion">
            <div class="loading">불러오는 중...</div>
          </div>
        </div>

        <div class="sidebar-footer">
          <div class="side-note">
            체크한 항목은 다시 클릭하면 해제할 수 있습니다.
          </div>
        </div>
      </aside>

      <main class="card main">
        <div class="hero">
          <div>
            <div class="step-chip" id="heroChip">STEP</div>
            <h2 id="heroTitle">불러오는 중...</h2>
            <p id="heroDesc"></p>
          </div>

          <div class="actions">
            <button class="btn secondary" id="faqBtn" type="button">FAQ 보기</button>
          </div>
        </div>

        <section class="guide">
          <div class="guide-section lead-box">
            <div class="section-label">이 단계에서는 뭘 할까요?</div>
            <p class="lead-text" id="leadText">시트 데이터를 불러오는 중입니다.</p>
          </div>

          <div class="guide-section">
            <div class="section-label">이렇게 진행해요</div>
            <ul class="flow-list" id="flowList"></ul>
          </div>

          <div class="guide-section">
            <div class="section-label">자세히 안내드릴게요</div>
            <div class="detail-list" id="detailList"></div>
          </div>

          <div class="guide-section">
            <div class="section-label">이것만 확인하면 돼요</div>
            <div class="check-area" id="checkArea"></div>
          </div>
        </section>

        <div class="footer-nav">
          <button class="btn secondary" id="prevBtn" type="button">이전 단계</button>
          <button class="btn primary" id="nextBtn" type="button">다음 단계</button>
        </div>

        <div id="errorBox"></div>
      </main>
    </div>
  </div>

  <div class="modal" id="faqModal" aria-hidden="true">
    <div class="modal-backdrop" id="faqBackdrop"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="faqModalTitle">
      <div class="modal-head">
        <div>
          <h3 class="modal-title" id="faqModalTitle">FAQ</h3>
          <p class="modal-sub" id="faqModalSub">현재 단계에서 자주 막히는 항목을 정리했습니다.</p>
        </div>
        <button class="icon-btn" id="faqCloseBtn" type="button" aria-label="닫기">×</button>
      </div>

      <div class="faq-list" id="faqList"></div>
    </div>
  </div>

  <script>
    const CONFIG = {
      SPREADSHEET_ID: '1JzTyCkZHBMEQiKNqIXLB8KUiVY8Y-33KICB2lwM06GQ',
      SHEETS: {
        steps: 'steps',
        contents: 'contents',
        checklists: 'checklists',
        faqs: 'faqs',
        clients: '고객사링크'
      },
      DEFAULT_SUBTITLE: '시트에 입력한 내용이 자동 반영됩니다.'
    };

    let DATA = [];
    let CLIENT_INFO = null;
    let currentIndex = 0;
    let openStepId = '';
    let state = loadState();

    const stepAccordion = document.getElementById("stepAccordion");
    const progressText = document.getElementById("progressText");
    const heroChip = document.getElementById("heroChip");
    const heroTitle = document.getElementById("heroTitle");
    const heroDesc = document.getElementById("heroDesc");
    const leadText = document.getElementById("leadText");
    const flowList = document.getElementById("flowList");
    const detailList = document.getElementById("detailList");
    const checkArea = document.getElementById("checkArea");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const faqBtn = document.getElementById("faqBtn");
    const faqModal = document.getElementById("faqModal");
    const faqBackdrop = document.getElementById("faqBackdrop");
    const faqCloseBtn = document.getElementById("faqCloseBtn");
    const faqModalTitle = document.getElementById("faqModalTitle");
    const faqModalSub = document.getElementById("faqModalSub");
    const faqList = document.getElementById("faqList");
    const errorBox = document.getElementById("errorBox");
    const appSub = document.getElementById("appSub");
    const pageTitle = document.getElementById("pageTitle");

    google.charts.load('current');
    google.charts.setOnLoadCallback(init);

    async function init() {
      try {
        const [stepsRows, contentsRows, checklistRows, faqRows, clientRows] = await Promise.all([
          querySheet(CONFIG.SHEETS.steps),
          querySheet(CONFIG.SHEETS.contents),
          querySheet(CONFIG.SHEETS.checklists),
          querySheet(CONFIG.SHEETS.faqs),
          querySheet(CONFIG.SHEETS.clients)
        ]);

        const clientCode = getClientCodeFromUrl_();
        if (!clientCode) {
          throw new Error('고객사 코드가 없습니다. 링크에 ?client=고객사코드 형식이 필요합니다.');
        }

        CLIENT_INFO = findClientInfo_(clientRows, clientCode);
        if (!CLIENT_INFO) {
          throw new Error('유효하지 않은 고객사 링크입니다. 고객사코드를 확인해주세요.');
        }

        if (String(CLIENT_INFO['사용여부'] || '').toUpperCase() === 'N') {
          throw new Error('현재 비활성화된 고객사 링크입니다.');
        }

        DATA = buildData(stepsRows, contentsRows, checklistRows, faqRows);

        if (!DATA.length) {
          throw new Error('활성화된 steps 데이터가 없습니다. steps 시트의 사용여부 값을 확인해주세요.');
        }

        const customerName = String(CLIENT_INFO['고객사명'] || '').trim();
        document.title = `${customerName} | 품고 셀프 온보딩`;
        pageTitle.textContent = customerName ? `${customerName} 셀프 온보딩` : '품고 셀프 온보딩';
        appSub.textContent = customerName
          ? `${customerName} 전용 셀프 온보딩 페이지입니다.`
          : CONFIG.DEFAULT_SUBTITLE;

        state = loadState();
        currentIndex = Math.min(state.currentIndex ?? 0, DATA.length - 1);
        openStepId = state.openStepId || DATA[currentIndex].id;

        render();
      } catch (err) {
        showError(
          '시트 데이터를 불러오지 못했습니다.\n\n' +
          '1) SPREADSHEET_ID가 맞는지\n' +
          '2) 시트 탭 이름이 steps / contents / checklists / faqs / 고객사링크 인지\n' +
          '3) 링크에 ?client=고객사코드 가 들어있는지\n' +
          '4) 고객사링크 시트의 사용여부가 Y인지\n\n' +
          '상세 오류:\n' + (err?.message || String(err))
        );
      }
    }

    function querySheet(sheetName) {
      return new Promise((resolve, reject) => {
        const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SPREADSHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}`;
        const query = new google.visualization.Query(url);
        query.setQuery('select *');

        query.send(response => {
          if (response.isError()) {
            reject(new Error(response.getMessage() || `시트 조회 실패: ${sheetName}`));
            return;
          }

          const dt = response.getDataTable();
          const cols = [];
          for (let c = 0; c < dt.getNumberOfColumns(); c++) {
            cols.push(String(dt.getColumnLabel(c) || dt.getColumnId(c) || `col_${c}`).trim());
          }

          const rows = [];
          for (let r = 0; r < dt.getNumberOfRows(); r++) {
            const row = {};
            for (let c = 0; c < dt.getNumberOfColumns(); c++) {
              const raw = dt.getValue(r, c);
              const formatted = dt.getFormattedValue(r, c);
              row[cols[c]] = formatted ?? raw ?? '';
            }
            rows.push(row);
          }
          resolve(rows);
        });
      });
    }

    function buildData(stepsRows, contentsRows, checklistRows, faqRows) {
      const activeSteps = stepsRows
        .filter(r => String(r['사용여부'] || '').toUpperCase() !== 'N')
        .sort((a, b) => Number(a['단계순서'] || 0) - Number(b['단계순서'] || 0));

      return activeSteps.map(step => {
        const stepId = String(step['단계ID'] || '').trim();

        const items = contentsRows
          .filter(r => String(r['단계ID'] || '').trim() === stepId)
          .sort((a, b) => Number(a['항목순서'] || 0) - Number(b['항목순서'] || 0))
          .map(r => ({
            title: r['항목명'] || '',
            type: String(r['항목타입'] || 'section').toLowerCase(),
            bodyHtml: r['본문HTML'] || '',
            noteHtml: r['안내HTML'] || '',
            warnHtml: r['주의HTML'] || '',
            imageUrl: r['이미지URL'] || '',
            imageCaption: r['이미지캡션'] || '',
            linkText: r['버튼텍스트'] || '',
            linkUrl: r['버튼링크'] || ''
          }));

        const checks = checklistRows
          .filter(r => String(r['단계ID'] || '').trim() === stepId)
          .sort((a, b) => Number(a['체크순서'] || 0) - Number(b['체크순서'] || 0))
          .map(r => r['체크문구'] || '');

        const faqs = faqRows
          .filter(r => String(r['단계ID'] || '').trim() === stepId)
          .sort((a, b) => Number(a['FAQ순서'] || 0) - Number(b['FAQ순서'] || 0))
          .map(r => ({
            q: r['질문'] || '',
            aHtml: r['답변HTML'] || ''
          }));

        return {
          id: stepId,
          title: step['단계명'] || '',
          desc: step['단계설명'] || '',
          leadHtml: step['리드문구'] || '',
          items,
          checks,
          faqs
        };
      });
    }

    function getClientCodeFromUrl_() {
      const params = new URLSearchParams(window.location.search);
      return String(params.get('client') || '').trim();
    }

    function findClientInfo_(clientRows, clientCode) {
      if (!clientCode) return null;
      return clientRows.find(r => String(r['고객사코드'] || '').trim() === clientCode) || null;
    }

    function storageKey() {
      const clientCode = getClientCodeFromUrl_() || 'default';
      return `poomgo_onboarding_${CONFIG.SPREADSHEET_ID}_${clientCode}`;
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(storageKey());
        return raw ? JSON.parse(raw) : { checks: {}, currentIndex: 0, openStepId: '' };
      } catch (e) {
        return { checks: {}, currentIndex: 0, openStepId: '' };
      }
    }

    function saveState() {
      localStorage.setItem(storageKey(), JSON.stringify({
        checks: state.checks || {},
        currentIndex,
        openStepId
      }));
    }

    function getChecks(stepId) {
      if (!state.checks) state.checks = {};
      if (!state.checks[stepId]) state.checks[stepId] = [];
      return state.checks[stepId];
    }

    function isStepDone(step) {
      const arr = getChecks(step.id);
      return step.checks.length > 0 && step.checks.every((_, i) => !!arr[i]);
    }

    function statusOf(step, idx) {
      if (isStepDone(step)) return { text: "완료", cls: "done" };
      if (idx === currentIndex) return { text: "진행중", cls: "current" };
      return { text: "대기", cls: "" };
    }

    function render() {
      renderAccordion();
      renderMain();
      errorBox.innerHTML = '';
    }

    function renderAccordion() {
      stepAccordion.innerHTML = "";
      const doneCount = DATA.filter(isStepDone).length;
      progressText.textContent = `${doneCount} / ${DATA.length} 완료`;

      DATA.forEach((step, idx) => {
        const s = statusOf(step, idx);
        const item = document.createElement("div");
        item.className = "step-item" + (openStepId === step.id ? " active" : "");

        item.innerHTML = `
          <button class="step-header" type="button">
            <div class="step-num">${idx + 1}</div>
            <div class="step-main">
              <div class="step-title">${escapeHtml(step.title)}</div>
              <div class="step-state">
                <span class="dot ${s.cls}"></span>
                <span>${s.text}</span>
              </div>
            </div>
            <div class="chev">⌄</div>
          </button>
          <div class="step-body">
            <div class="step-sublist">
              ${step.items.map(x => `<div class="step-subitem"><span>ㄴ</span><span>${escapeHtml(x.title)}</span></div>`).join("") || `<div class="empty">하위 항목 없음</div>`}
            </div>
          </div>
        `;

        item.querySelector(".step-header").addEventListener("click", () => {
          currentIndex = idx;
          openStepId = openStepId === step.id ? "" : step.id;
          saveState();
          render();
        });

        stepAccordion.appendChild(item);
      });

      scrollCurrentStepIntoView();
    }

    function renderMain() {
      const step = DATA[currentIndex];
      heroChip.textContent = `STEP ${currentIndex + 1}`;
      heroTitle.textContent = step.title;
      heroDesc.textContent = step.desc;
      leadText.innerHTML = step.leadHtml || '<span class="empty">리드문구가 비어 있습니다.</span>';

      flowList.innerHTML = "";
      step.items.forEach((item, idx) => {
        const li = document.createElement("li");
        li.innerHTML = `
          <div class="flow-num">${idx + 1}</div>
          <div class="flow-text">${escapeHtml(item.title)}</div>
        `;
        flowList.appendChild(li);
      });

      detailList.innerHTML = "";
      step.items.forEach(item => {
        const div = document.createElement("div");
        div.className = "detail-item";
        div.innerHTML = renderDetail(item);
        detailList.appendChild(div);
      });

      checkArea.innerHTML = "";
      const checks = getChecks(step.id);

      step.checks.forEach((label, i) => {
        const row = document.createElement("label");
        row.className = "check-row";
        row.innerHTML = `
          <input type="checkbox" ${checks[i] ? "checked" : ""}>
          <span>${escapeHtml(label)}</span>
        `;

        row.querySelector("input").addEventListener("change", (e) => {
          checks[i] = e.target.checked;

          if (isStepDone(step)) {
            openStepId = "";
            if (currentIndex < DATA.length - 1) {
              currentIndex += 1;
              openStepId = DATA[currentIndex].id;
            }
          } else {
            openStepId = step.id;
          }

          saveState();
          render();
        });

        checkArea.appendChild(row);
      });

      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === DATA.length - 1;
    }

    function renderDetail(item) {
      const title = `<h3 class="detail-title">${escapeHtml(item.title)}</h3>`;
      const body = item.bodyHtml
        ? `<div class="detail-body">${wrapTables(item.bodyHtml)}</div>`
        : '';

      const note = item.noteHtml
        ? `<div class="subnote">${item.noteHtml}</div>`
        : '';

      const warn = item.warnHtml
        ? `<div class="warn"><strong>주의</strong>${item.warnHtml}</div>`
        : '';

      const image = item.imageUrl
        ? `
          <div class="render-image">
            <img src="${escapeAttr(item.imageUrl)}" alt="${escapeAttr(item.title)}">
            ${item.imageCaption ? `<div class="render-caption">${item.imageCaption}</div>` : ''}
          </div>
        `
        : '';

      if (item.type === 'path') {
        return `
          ${title}
          <div class="subnote">${escapeHtml(stripHtml(item.bodyHtml)).replaceAll(">", "→")}</div>
          ${warn}
        `;
      }

      if (item.type === 'link') {
        return `
          ${title}
          ${body}
          ${warn}
          ${item.linkUrl ? `<div style="margin-top:12px;"><a class="btn primary" href="${escapeAttr(item.linkUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.linkText || '바로가기')}</a></div>` : ''}
        `;
      }

      if (item.type === 'image' || item.type === 'html') {
        return `
          ${title}
          ${body}
          ${image}
          ${note}
          ${warn}
        `;
      }

      return `
        ${title}
        ${body}
        ${image}
        ${note}
        ${warn}
      `;
    }

    function wrapTables(html) {
      const temp = document.createElement('div');
      temp.innerHTML = html;
      temp.querySelectorAll('table').forEach(table => {
        const wrapper = document.createElement('div');
        wrapper.className = 'table-wrap';
        table.parentNode.insertBefore(wrapper, table);
        wrapper.appendChild(table);
      });
      return temp.innerHTML;
    }

    function stripHtml(html) {
      const div = document.createElement('div');
      div.innerHTML = html || '';
      return div.textContent || div.innerText || '';
    }

    function openFaqModal() {
      const step = DATA[currentIndex];
      faqModalTitle.textContent = `${step.title} FAQ`;
      faqModalSub.textContent = "현재 단계에서 자주 막히는 항목을 정리했습니다.";
      faqList.innerHTML = "";

      if (!step.faqs.length) {
        faqList.innerHTML = `<div class="empty">등록된 FAQ가 없습니다.</div>`;
      } else {
        step.faqs.forEach((faq, idx) => {
          const item = document.createElement("div");
          item.className = "faq-item" + (idx === 0 ? " open" : "");
          item.innerHTML = `
            <button class="faq-q" type="button">
              <span>${escapeHtml(faq.q)}</span>
              <span class="faq-arrow">⌄</span>
            </button>
            <div class="faq-a">${faq.aHtml}</div>
          `;

          item.querySelector(".faq-q").addEventListener("click", () => {
            item.classList.toggle("open");
          });

          faqList.appendChild(item);
        });
      }

      faqModal.classList.add("open");
      faqModal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeFaqModal() {
      faqModal.classList.remove("open");
      faqModal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function scrollCurrentStepIntoView() {
      const container = document.querySelector(".sidebar-steps");
      if (!container) return;

      const active = container.querySelector(".step-item.active");
      if (!active) return;

      const containerRect = container.getBoundingClientRect();
      const activeRect = active.getBoundingClientRect();

      const offset =
        activeRect.top -
        containerRect.top -
        containerRect.height / 2 +
        activeRect.height / 2;

      container.scrollBy({
        top: offset,
        behavior: "smooth"
      });
    }

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escapeAttr(str = "") {
      return escapeHtml(str);
    }

    function showError(message) {
      errorBox.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
      stepAccordion.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
      heroTitle.textContent = '불러오기 실패';
      heroDesc.textContent = '';
      leadText.textContent = '시트 연결 상태를 확인해주세요.';
      flowList.innerHTML = '';
      detailList.innerHTML = '';
      checkArea.innerHTML = '';
    }

    prevBtn.addEventListener("click", () => {
      if (currentIndex > 0) {
        currentIndex -= 1;
        openStepId = DATA[currentIndex].id;
        saveState();
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    });

    nextBtn.addEventListener("click", () => {
      if (currentIndex < DATA.length - 1) {
        currentIndex += 1;
        openStepId = DATA[currentIndex].id;
        saveState();
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    });

    faqBtn.addEventListener("click", openFaqModal);
    faqCloseBtn.addEventListener("click", closeFaqModal);
    faqBackdrop.addEventListener("click", closeFaqModal);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && faqModal.classList.contains("open")) {
        closeFaqModal();
      }
    });
  </script>
</body>
</html>
